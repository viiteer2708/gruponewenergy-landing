<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tramita Tu Contrato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #fff;
            color: #0F172A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 520px;
            width: 100%;
        }

        .headline {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.03em;
            color: #0F172A;
            margin-bottom: 1.25rem;
        }

        .body-text {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #475569;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .form-row {
            display: flex;
            gap: .75rem;
        }

        .form-row input {
            flex: 1;
            padding: .85rem 1.1rem;
            border: 1.5px solid #E2E8F0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            color: #0F172A;
            background: #fff;
            outline: none;
            transition: border-color .2s;
        }

        .form-row input:focus {
            border-color: #0F172A;
        }

        .form-row input::placeholder {
            color: #94A3B8;
        }

        .form-row button {
            padding: .85rem 1.75rem;
            background: #0F172A;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background .2s;
            white-space: nowrap;
        }

        .form-row button:hover {
            background: #1E293B;
        }

        .form-row button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .msg {
            margin-top: .75rem;
            font-size: .85rem;
            color: #64748B;
            display: none;
        }

        .msg.visible {
            display: block;
        }

        .msg.ok {
            color: #16A34A;
            font-weight: 600;
        }

        .note {
            margin-top: 2.5rem;
            font-size: .8rem;
            color: #94A3B8;
            line-height: 1.6;
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            font-size: .75rem;
            color: #CBD5E1;
        }

        @media (max-width: 500px) {
            .form-row {
                flex-direction: column;
            }

            .form-row button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<main>
    <div class="container">
        <h1 class="headline">Tus comerciales te envian contratos por WhatsApp.<br>Y los pierdes.</h1>
        <p class="body-text">Un formulario. Desde el movil. Los datos llegan organizados a tu email y los archivos a tu Drive. Sin perder ni uno.</p>

        <form id="captureForm" class="form-row">
            <input type="email" id="emailInput" placeholder="Tu email" required>
            <button type="submit" id="submitBtn">Quiero saber mas</button>
        </form>
        <div class="msg" id="msg"></div>

        <p class="note">Sin compromiso. Te escribimos una vez y te contamos como funciona.</p>
    </div>
</main>

<footer>&copy; 2026 tramitatucontrato.energy</footer>

<script>
(function() {
    const form = document.getElementById('captureForm');
    const emailInput = document.getElementById('emailInput');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    // IMPORTANTE: Pega aqui la URL de tu webhook de Make
    const MAKE_WEBHOOK = 'PEGA_AQUI_TU_WEBHOOK_DE_MAKE';

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        if (!email) return;

        btn.disabled = true;
        btn.textContent = 'Enviando...';

        try {
            await fetch(MAKE_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    source: 'tramitatucontrato.energy',
                    timestamp: new Date().toISOString()
                })
            });
        } catch (err) {
            // Fire & forget - si falla Make no importa
        }

        msg.textContent = 'Recibido. Te escribimos pronto.';
        msg.className = 'msg visible ok';
        emailInput.value = '';
        btn.textContent = 'Enviado';

        setTimeout(function() {
            btn.disabled = false;
            btn.textContent = 'Quiero saber mas';
        }, 3000);
    });
})();
</script>

</body>
</html>
