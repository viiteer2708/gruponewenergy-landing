<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrato Enviado | Grupo New Energy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,.1);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .check-circle {
            width: 80px;
            height: 80px;
            background: #DCFCE7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn .4s ease;
        }

        .check-circle svg {
            width: 40px;
            height: 40px;
            stroke: #16A34A;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo {
            width: 140px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #094D38;
            margin-bottom: .75rem;
        }

        p {
            color: #6B7280;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .info-box {
            background: #f0faf6;
            border: 1px solid #d1ede3;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            font-size: .875rem;
            color: #094D38;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: .75rem 2rem;
            background: #0B6E4F;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: .95rem;
            transition: background .2s;
        }

        .btn:hover {
            background: #094D38;
        }

        footer {
            margin-top: 2rem;
            color: #9CA3AF;
            font-size: .8rem;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://dl.dropboxusercontent.com/scl/fi/8fgtbv4s3uyfwwyh7ie93/Redes-sociales-01.png?rlkey=wzp55afahi4ks8z9u1c4v8i65"
         alt="Grupo New Energy" class="logo">

    <div class="check-circle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>

    <h1>Contrato Enviado</h1>
    <p>Hemos recibido tu solicitud con toda la documentacion adjunta. Nos ponemos YA con la tramitacion de tu contrato.</p>

    <div class="info-box">
        Los datos y archivos adjuntos han sido enviados a<br>
        <strong>escaneos@gruponew.energy</strong>
    </div>

    <a href="gnew.html" class="btn">Tramitar otro contrato</a>
</div>

<footer>&copy; 2026 Grupo New Energy</footer>

</body>
</html>
